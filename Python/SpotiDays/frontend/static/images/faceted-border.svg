<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Top Edge -->
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#d4ff00"/>
      <stop offset="100%" stop-color="#556b2f"/>
    </linearGradient>
    
    <!-- Top-Right -->
    <linearGradient id="tr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#556b2f"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    
    <!-- Right Edge -->
    <linearGradient id="right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#556b2f"/>
      <stop offset="100%" stop-color="#d4ff00"/>
    </linearGradient>
    
    <!-- Bottom-Right -->
    <linearGradient id="br" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4ff00"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    
    <!-- Bottom Edge -->
    <linearGradient id="bottom" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#d4ff00"/>
      <stop offset="100%" stop-color="#556b2f"/>
    </linearGradient>
    
    <!-- Bottom-Left -->
    <linearGradient id="bl" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#556b2f"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    
    <!-- Left Edge -->
    <linearGradient id="left" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#556b2f"/>
      <stop offset="100%" stop-color="#d4ff00"/>
    </linearGradient>
    
    <!-- Top-Left -->
    <linearGradient id="tl" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4ff00"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Edge and Corner Segments -->
  <polygon points="10,0 90,0 75,20 25,20" fill="url(#top)"/>
  <polygon points="90,0 100,10 80,25 75,20" fill="url(#tr)"/>
  <polygon points="100,10 100,90 80,75 80,25" fill="url(#right)"/>
  <polygon points="100,90 90,100 75,80 80,75" fill="url(#br)"/>
  <polygon points="90,100 10,100 25,80 75,80" fill="url(#bottom)"/>
  <polygon points="10,100 0,90 20,75 25,80" fill="url(#bl)"/>
  <polygon points="0,90 0,10 20,25 20,75" fill="url(#left)"/>
  <polygon points="0,10 10,0 25,20 20,25" fill="url(#tl)"/>
</svg>
