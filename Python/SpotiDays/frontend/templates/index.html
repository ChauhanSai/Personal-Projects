<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotiDays</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="flashlight"></div>
    
    <!-- Shared Disco Ball between sections -->
    <div id="main-disco-ball" class="disco-ball"></div>

    <section id="landing" class="section">
        <h1 class="title-main">SPOTIDAYS</h1>
        <a href="/curate" class="btn btn-primary" style="margin-top: 30px; z-index: 10;">
            <svg style="width: 24px; height: 24px; margin-right: 10px;" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.54.659.301 1.02zm1.44-3.3c-.301.42-.84.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.84.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.54-1.02.72-1.56.3z"/>
            </svg>
            Sign in with Spotify
        </a>
    </section>

    <section id="features" class="section">
        <div style="max-width: 600px; z-index: 10;">
            <h2 style="font-size: 3rem; margin-bottom: 20px;">
                <span style="color: #fff;">Curated</span> 
                <span style="color: var(--accent-color);">Nights.</span><br>
                <span style="color: #fff;">Infinite Vibe.</span>
            </h2>
            <p class="feature-desc" style="margin-bottom: 40px;">Dive into a seamless audio journey. Your nightlife, decoded and amplified through intelligent curation.</p>
            
            <div class="glass-card">
                <h3 class="feature-title">
                    <svg style="width: 20px; height: 20px; fill: var(--accent-color);" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
                    Sonic Profiling
                </h3>
            </div>
            
            <div class="glass-card">
                <h3 class="feature-title">
                    <svg style="width: 20px; height: 20px; fill: var(--accent-color);" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    Crowd Sync
                </h3>
            </div>
            
            <div class="glass-card">
                <h3 class="feature-title">
                    <svg style="width: 20px; height: 20px; fill: var(--accent-color);" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 4.18L18.09 19H5.91L12 6.18z"/></svg>
                    Venue Discovery
                </h3>
                <p class="feature-desc" style="margin: 0; padding-left: 30px;">Find your next nocturnal anchor.</p>
            </div>
        </div>
    </section>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
